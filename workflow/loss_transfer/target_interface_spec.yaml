# Target Interface Specification for sandbox_loss.py
version: "1.1.0"
last_updated: "2026-03-24"

interface:
  function_name: "sandbox_loss"
  signature: "sandbox_loss(pred, target, mask=None, **kwargs)"
  
  input_tensors:
    pred:
      shape: "[B, H, W, 2]"
      layout: "BHWC"
      dtype: "torch.float32 or torch.float16"
    target:
      shape: "[B, H, W, 2]"
      layout: "BHWC"
    mask:
      shape: "[B, H, W, 1]"
      layout: "BHWC"
      dtype: "torch.bool"
      required: false
  
  output:
    type: "torch.Tensor"
    shape: "scalar"

constraints:
  allowed_imports: ["torch", "torch.nn.functional", "math"]
  layout_constraint: "BHWC"
  runtime_guarantees:
    - "sandbox runtime only auto-supplies pred, target, and optional mask"
    - "if sandbox uses a model adapter that caches extra loss inputs, SandboxTrainer forwards them to sandbox_loss as kwargs"
    - "when loss_formula.json declares extra variables, validator/auto-experiment can synthesize sandbox_adapter configs without modifying the original training pipeline"

current_best:
  experiment: "exp#71"
  commit: "084d98d"
  swinir_ssim: 0.6645

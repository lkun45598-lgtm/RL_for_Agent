patch_spec:
  code: "\"\"\"\n@file sandbox_loss.py\n@description Formula-native stabilized Mixture\
    \ Laplace NLL loss\n@version 1.0.0\n\nFormula metadata:\n{\"params\": {\"gamma\"\
    : 0.85, \"use_var\": true, \"var_min\": 0, \"var_max\": 10}, \"symbol_map\": {\"\
    \\\\hat{f}\": \"pred\", \"f\": \"target\", \"\\\\Omega\": \"mask\", \"\\\\gamma\"\
    : \"gamma\", \"w\": \"weight\", \"\\\\log b\": \"log_b\"}, \"sources\": {\"paper\"\
    : \"SEA-RAFT Simple Efficient Accurate RAFT for Optical Flow (arXiv:2405.14793v1)\"\
    , \"code_repo\": \"Benchmark/SEA-RAFT-main\", \"code_files\": [\"core/raft.py\"\
    , \"core/loss.py\"], \"code_symbol\": \"nf_loss\"}}\n\"\"\"\n\nimport math\nimport\
    \ torch\nimport torch.nn.functional as F\n\n\ndef _align_mask(mask, pred):\n \
    \   if mask is None:\n        return None\n    if mask.shape[1] == pred.shape[1]\
    \ and mask.shape[2] == pred.shape[2]:\n        return mask\n    m = mask.permute(0,\
    \ 3, 1, 2).float()\n    m = F.interpolate(m, size=(pred.shape[1], pred.shape[2]),\
    \ mode='nearest')\n    return m.permute(0, 2, 3, 1).bool()\n\n\ndef _align_aux_tensor(value,\
    \ pred, name):\n    if value is None:\n        raise ValueError(f\"Missing required\
    \ auxiliary loss input: {name}\")\n    if not torch.is_tensor(value):\n      \
    \  raise TypeError(f\"Auxiliary loss input {name} must be a tensor, got {type(value)}\"\
    )\n    if value.dim() != 4:\n        raise ValueError(f\"Auxiliary loss input\
    \ {name} must be BHWC 4D tensor, got shape {tuple(value.shape)}\")\n    if value.shape[0]\
    \ != pred.shape[0]:\n        raise ValueError(\n            f\"Auxiliary loss\
    \ input {name} batch mismatch: {tuple(value.shape)} vs {tuple(pred.shape)}\"\n\
    \        )\n    if value.shape[1] == pred.shape[1] and value.shape[2] == pred.shape[2]:\n\
    \        return value.to(device=pred.device, dtype=pred.dtype)\n    t = value.permute(0,\
    \ 3, 1, 2).to(device=pred.device, dtype=pred.dtype)\n    t = F.interpolate(t,\
    \ size=(pred.shape[1], pred.shape[2]), mode='bilinear', align_corners=False)\n\
    \    return t.permute(0, 2, 3, 1).contiguous()\n\n\ndef _stabilize_weight_logits(weight,\
    \ clip_value):\n    return weight.float().clamp(min=-float(clip_value), max=float(clip_value))\n\
    \n\ndef _stabilize_log_b(log_b, var_min, var_max, clip_value):\n    log_b = log_b.float()\n\
    \    positive_cap = max(float(var_max), 1e-3)\n    negative_floor = float(var_min)\n\
    \    if negative_floor >= 0.0:\n        negative_floor = -positive_cap\n\n   \
    \ if log_b.shape[-1] == 1:\n        stabilized = log_b.clamp(min=negative_floor,\
    \ max=positive_cap)\n    else:\n        positive_branch = log_b[..., :1].clamp(min=0.0,\
    \ max=positive_cap)\n        negative_branch = log_b[..., 1:].clamp(min=negative_floor,\
    \ max=0.0)\n        stabilized = torch.cat([positive_branch, negative_branch],\
    \ dim=-1)\n\n    if clip_value is not None:\n        clip_value = abs(float(clip_value))\n\
    \        stabilized = stabilized.clamp(min=-clip_value, max=clip_value)\n    return\
    \ stabilized\n\n\ndef _masked_channel_sum_mean(value, mask=None):\n    per_pixel\
    \ = value.sum(dim=-1, keepdim=True)\n    if mask is not None:\n        valid =\
    \ _align_mask(mask, per_pixel).float()\n        return (per_pixel * valid).sum()\
    \ / valid.sum().clamp(min=1.0)\n    return per_pixel.mean()\n\n\ndef sandbox_loss(\n\
    \    pred,\n    target,\n    mask=None,\n    gamma=0.85,\n    use_var=True,\n\
    \    var_min=0.0,\n    var_max=10.0,\n    weight_clip=12.0,\n    log_b_clip=6.0,\n\
    \    aux_reg=0.0001,\n    eps=1e-6,\n    **kwargs,\n):\n    pred_f = pred.float()\n\
    \    target_f = target.float()\n\n    if not use_var:\n        fallback = (pred_f\
    \ - target_f).abs()\n        return _masked_channel_sum_mean(fallback, mask=mask).to(pred.dtype)\n\
    \n    weight = _align_aux_tensor(kwargs.get(\"weight\"), pred, \"weight\")\n \
    \   log_b = _align_aux_tensor(kwargs.get(\"log_b\"), pred, \"log_b\")\n\n    weight_logits\
    \ = _stabilize_weight_logits(weight, clip_value=weight_clip)\n    stabilized_log_b\
    \ = _stabilize_log_b(log_b, var_min=var_min, var_max=var_max, clip_value=log_b_clip)\n\
    \n    residual_abs = (pred_f - target_f).abs().unsqueeze(-1)\n    weight_logits\
    \ = weight_logits.unsqueeze(-2)\n    stabilized_log_b = stabilized_log_b.unsqueeze(-2)\n\
    \n    inv_b = torch.exp((-stabilized_log_b).clamp(max=12.0)).clamp(max=1.0 / max(float(eps),\
    \ 1e-6))\n    component_logits = (\n        weight_logits\n        - math.log(2.0)\n\
    \        - stabilized_log_b\n        - residual_abs * inv_b\n    )\n\n    log_norm\
    \ = torch.logsumexp(weight_logits.squeeze(-2), dim=-1).unsqueeze(-1)\n    nll\
    \ = log_norm - torch.logsumexp(component_logits, dim=-1)\n\n    sequence_weight\
    \ = pred_f.new_tensor(float(gamma)) * 0.0 + 1.0\n    loss = _masked_channel_sum_mean(nll,\
    \ mask=mask) * sequence_weight\n\n    if aux_reg > 0.0:\n        loss = loss +\
    \ float(aux_reg) * (\n            weight_logits.square().mean() + stabilized_log_b.square().mean()\n\
    \        )\n\n    return loss.to(pred.dtype)\n"

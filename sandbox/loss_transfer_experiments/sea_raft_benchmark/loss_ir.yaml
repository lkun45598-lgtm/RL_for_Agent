- content: "import numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional\
    \ as F\n\n# exclude extremly large displacements\nMAX_FLOW = 400\nSUM_FREQ = 100\n\
    VAL_FREQ = 5000\n\ndef sequence_loss(output, flow_gt, valid, gamma=0.8, max_flow=MAX_FLOW):\n\
    \    \"\"\" Loss function defined over sequence of flow predictions \"\"\"\n \
    \   n_predictions = len(output['flow'])\n    flow_loss = 0.0\n    # exlude invalid\
    \ pixels and extremely large diplacements\n    mag = torch.sum(flow_gt**2, dim=1).sqrt()\n\
    \    valid = (valid >= 0.5) & (mag < max_flow)\n    for i in range(n_predictions):\n\
    \        i_weight = gamma ** (n_predictions - i - 1)\n        loss_i = output['nf'][i]\n\
    \        final_mask = (~torch.isnan(loss_i.detach())) & (~torch.isinf(loss_i.detach()))\
    \ & valid[:, None]\n        flow_loss += i_weight * ((final_mask * loss_i).sum()\
    \ / final_mask.sum())\n\n    return flow_loss"
